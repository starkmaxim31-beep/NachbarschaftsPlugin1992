name: Build Minecraft Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Java installieren
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Maven Build starten
        run: mvn clean package

      - name: Plugin hochladen
        uses: actions/upload-artifact@v4
        with:
          name: NachbarschaftsPlugin
          path: target/*.jar
